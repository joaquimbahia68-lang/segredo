<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#0f172a,#1e293b,#312e81);
overflow:hidden;
}

body::before{
content:"";
position:absolute;
width:500px;
height:500px;
background:#4f46e5;
border-radius:50%;
filter:blur(150px);
left:-150px;
top:-150px;
opacity:.5;
}

body::after{
content:"";
position:absolute;
width:400px;
height:400px;
background:#06b6d4;
border-radius:50%;
filter:blur(130px);
right:-120px;
bottom:-120px;
opacity:.5;
}

.card{
position:relative;
z-index:1;
width:min(90%,700px);
background:rgba(255,255,255,.08);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,.15);
border-radius:30px;
padding:40px;
text-align:center;
color:#fff;
box-shadow:0 20px 50px rgba(0,0,0,.35);
animation:fade .5s;
}

.page{
display:none;
}

.page.active{
display:block;
}

h1{
font-size:2rem;
margin-bottom:20px;
}

p{
font-size:1.1rem;
opacity:.9;
}

button{
margin-top:35px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(45deg,#6366f1,#06b6d4);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.08);
box-shadow:0 0 25px rgba(99,102,241,.6);
}

.socials{
display:flex;
justify-content:center;
gap:40px;
margin-top:35px;
flex-wrap:wrap;
}

.social{
width:220px;
padding:20px;
border-radius:20px;
background:rgba(255,255,255,.08);
transition:.3s;
}

.social:hover{
transform:translateY(-8px);
}

.icon{
font-size:70px;
margin-bottom:10px;
}

.tiktok{
color:#ff2d55;
}

.youtube{
color:#ff0000;
}

a{
color:#7dd3fc;
text-decoration:none;
font-size:14px;
word-break:break-all;
}

.reward{
font-size:22px;
margin-top:20px;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}
</style>
</head>
<body>

<div class="card">

<div class="page active">
<h1>📱 Parece que você escaneou o QR Code!</h1>
<p>Bem-vindo! Clique no botão abaixo para continuar.</p>
<button onclick="next()">Próxima Página ➜</button>
</div>

<div class="page">
<h1>Caso queira me seguir 😊</h1>

<div class="socials">

<div class="social">
<div class="icon tiktok">🎵</div>
<a href="https://www.tiktok.com/@arthur.santos.lou2?_r=1&_t=ZS-97uA56jGcdj" target="_blank">
https://www.tiktok.com/@arthur.santos.lou2?_r=1&_t=ZS-97uA56jGcdj
</a>
</div>

<div class="social">
<div class="icon youtube">▶️</div>
<a href="https://youtube.com/@thurdev-btw?si=Sw04Q2Rm8q8JlPq2" target="_blank">
https://youtube.com/@thurdev-btw?si=Sw04Q2Rm8q8JlPq2
</a>
</div>

</div>

<button onclick="next()">Continuar ➜</button>

</div>

<div class="page">
<h1>🎉 Você terminou!</h1>
<p class="reward">Agora sua recompensa está pronta...</p>

<button onclick="reward()">
🎁 Receber Recompensa
</button>

</div>

</div>

<script>
const pages=document.querySelectorAll(".page");
let current=0;

function next(){
pages[current].classList.remove("active");
current++;
pages[current].classList.add("active");
}

function reward(){
window.location.href="https://youtu.be/dQw4w9WgXcQ?is=wFKigr-wyhuqgjIP";
}
</script>

</body>
</html>
